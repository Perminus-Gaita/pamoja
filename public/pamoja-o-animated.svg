<!-- Emoji artwork: Twemoji by X/Twitter, licensed CC-BY 4.0 (https://github.com/jdecked/twemoji). Wordmark: Poppins (OFL). -->
  <style>
    .o-grp { transform-box: fill-box; transform-origin: center; }
    .o-hug   { animation: pjHug   5.6s ease-in-out infinite; }
    .o-heart { animation: pjHeart 5.6s ease-in-out infinite; }
    @keyframes pjHug {
      0%,56%{opacity:1;transform:scale(1)} 64%{opacity:0;transform:scale(.72)}
      90%{opacity:0;transform:scale(.72)} 98%,100%{opacity:1;transform:scale(1)}
    }
    @keyframes pjHeart {
      0%,56%{opacity:0;transform:scale(.72)} 64%{opacity:1;transform:scale(1.16)}
      72%,90%{opacity:1;transform:scale(1)} 97%,100%{opacity:0;transform:scale(.72)}
    }
    @media (prefers-reduced-motion: reduce){
      .o-hug{opacity:1;animation:none;transform:none}
      .o-heart{opacity:0;animation:none}
    }
  </style>

